<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생리통 약 추천 퀴즈 🌸</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:linear-gradient(145deg,#fff0f5 0%,#fce4ec 50%,#fdf2f8 100%);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
#app{width:100%;max-width:500px}

/* 헤더 */
.quiz-header{text-align:center;margin-bottom:1.5rem}
.quiz-header h1{font-size:22px;font-weight:700;color:#c2185b;letter-spacing:-0.3px}
.quiz-header p{font-size:13px;color:#e48aac;margin-top:4px}

/* 진행바 */
.progress-wrap{margin-bottom:1.25rem}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-meta span{font-size:12px;color:#e48aac;font-weight:500}
.progress-bar{height:6px;background:#fce4ec;border-radius:3px}
.progress-fill{height:100%;background:linear-gradient(90deg,#f48fb1,#e91e8c);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* 질문 카드 */
.question-card{background:#fff;border-radius:20px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 4px 24px rgba(233,30,140,.08);border:1px solid #fce4ec}
.question-badge{display:inline-flex;align-items:center;gap:6px;background:#fce4ec;border-radius:20px;padding:4px 12px;margin-bottom:12px}
.question-badge span{font-size:11px;font-weight:600;color:#c2185b}
.question-emoji{font-size:28px;margin-bottom:8px;display:block}
.question-text{font-size:17px;font-weight:700;color:#212121;line-height:1.5;letter-spacing:-0.3px}

/* 선택지 */
.options{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.option-btn{background:#fff;border:1.5px solid #f8bbd0;border-radius:14px;padding:13px 16px;font-size:14px;font-family:'Pretendard',sans-serif;font-weight:500;color:#424242;cursor:pointer;text-align:left;line-height:1.5;transition:all .2s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:10px}
.option-btn::before{content:'';width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid #f8bbd0;transition:all .2s;background:#fff}
.option-btn:hover{border-color:#e91e8c;background:#fff5f8;transform:translateX(2px)}
.option-btn.selected{border-color:#e91e8c;background:linear-gradient(90deg,#fff0f5,#fce4ec);color:#880e4f;font-weight:600}
.option-btn.selected::before{background:#e91e8c;border-color:#e91e8c;box-shadow:0 0 0 3px rgba(233,30,140,.15)}

/* 버튼 */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:10px}
.btn-back{background:#fff;border:1.5px solid #f8bbd0;border-radius:12px;padding:10px 18px;font-size:13px;font-family:'Pretendard',sans-serif;font-weight:600;color:#e48aac;cursor:pointer;transition:all .2s}
.btn-back:disabled{opacity:.3;cursor:default}
.btn-back:not(:disabled):hover{border-color:#e91e8c;color:#e91e8c}
.btn-next{flex:1;background:linear-gradient(90deg,#f48fb1,#e91e8c);border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-family:'Pretendard',sans-serif;font-weight:700;color:#fff;cursor:pointer;opacity:.4;pointer-events:none;transition:all .2s;letter-spacing:0.2px}
.btn-next.active{opacity:1;pointer-events:auto;box-shadow:0 4px 16px rgba(233,30,140,.3)}
.btn-next.active:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(233,30,140,.4)}

/* 결과 헤더 */
.result-header{text-align:center;padding:1rem 0 0.75rem}
.result-header .big-emoji{font-size:48px;display:block;margin-bottom:8px;animation:pop .4s cubic-bezier(.4,0,.2,1)}
@keyframes pop{0%{transform:scale(.6)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.result-header h2{font-size:20px;font-weight:800;color:#c2185b;letter-spacing:-0.5px}
.result-header p{font-size:13px;color:#e48aac;margin-top:4px}

/* 메인 제품 카드 */
.product-card{background:#fff;border-radius:20px;padding:1.25rem;margin:0.75rem 0;box-shadow:0 6px 28px rgba(233,30,140,.1);border:1.5px solid #f48fb1;position:relative;overflow:hidden}
.product-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle at top right,#fce4ec,transparent 70%)}
.product-icon-wrap{width:64px;height:64px;background:linear-gradient(135deg,#fce4ec,#f8bbd0);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px;box-shadow:0 2px 12px rgba(233,30,140,.15)}
.best-badge{display:inline-block;background:linear-gradient(90deg,#f48fb1,#e91e8c);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:0.5px}
.product-name{font-size:19px;font-weight:800;color:#880e4f;letter-spacing:-0.5px}
.product-mfg{font-size:12px;color:#e48aac;margin-top:2px;font-weight:500}
.product-ingredient{font-size:11px;color:#bbb;margin-top:4px;line-height:1.5}
.product-reason{font-size:13px;color:#424242;margin-top:12px;line-height:1.7;background:#fff9fb;border-radius:10px;padding:10px 12px;border-left:3px solid #f48fb1}

/* 복용법 박스 */
.dosage-box{background:linear-gradient(135deg,#fff0f5,#fce4ec);border-radius:12px;padding:12px 14px;margin-top:10px;border:1px solid #f8bbd0}
.dosage-title{font-size:12px;font-weight:700;color:#c2185b;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.dosage-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;font-size:12px;color:#5d4037;line-height:1.6}
.dosage-row:last-child{margin-bottom:0}
.dosage-dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:#f48fb1;margin-top:5px}

/* 주의사항 */
.caution-box{background:#fff8ee;border:1px solid #fac775;border-radius:10px;padding:10px 12px;margin-top:10px}
.caution-label{font-size:11px;font-weight:700;color:#e65100;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.caution-text{font-size:12px;color:#bf360c;line-height:1.7}

/* 대안 제품 */
.alt-section{margin-top:1.25rem}
.alt-label{font-size:13px;font-weight:700;color:#c2185b;margin-bottom:8px;padding-left:2px}
.alt-card{background:#fff;border:1px solid #fce4ec;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s}
.alt-card:hover{border-color:#f48fb1}
.alt-icon{width:44px;height:44px;min-width:44px;background:linear-gradient(135deg,#fce4ec,#fff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.alt-info{}
.alt-name{font-size:14px;font-weight:700;color:#424242}
.alt-reason{font-size:12px;color:#999;margin-top:2px;line-height:1.5}

/* 다시하기 */
.btn-restart{display:block;width:100%;margin-top:1.25rem;background:#fff;border:1.5px solid #f48fb1;border-radius:14px;padding:12px;font-size:14px;font-family:'Pretendard',sans-serif;font-weight:700;color:#e91e8c;cursor:pointer;text-align:center;transition:all .2s}
.btn-restart:hover{background:#fff0f5}
.disclaimer{font-size:11px;color:#ccc;text-align:center;margin-top:1rem;line-height:1.7}
</style>
</head>
<body>
<div id="app"></div>
<script>
const questions=[
  {id:'pain_type',emoji:'💫',text:'생리통이 주로 어떤 느낌인가요?',options:[
    {label:'꼬이고 쥐어짜는 느낌 (경련성)',value:'cramp'},
    {label:'묵직하고 욱신거리는 느낌',value:'dull'},
    {label:'아랫배 전체가 아프고 오래 지속돼요',value:'lasting'}
  ]},
  {id:'swell',emoji:'🌊',text:'생리 전후로 손발이 붓거나 몸이 무겁게 느껴지나요?',options:[
    {label:'네, 많이 부어요',value:'yes'},
    {label:'약간 있어요',value:'mild'},
    {label:'부종은 별로 없어요',value:'no'}
  ]},
  {id:'stomach',emoji:'🫙',text:'빈속에 약을 먹으면 속이 쓰린 편인가요?',options:[
    {label:'네, 위장이 약한 편이에요',value:'sensitive'},
    {label:'조금 불편한 편이에요',value:'mild'},
    {label:'괜찮은 편이에요',value:'ok'}
  ]},
  {id:'nsaids',emoji:'🌿',text:'이부프로펜 계열 약을 드셨을 때 알레르기나 심한 부작용이 있었나요?',options:[
    {label:'네, 있어요 (알레르기/부작용)',value:'yes'},
    {label:'아니요, 없어요',value:'no'},
    {label:'잘 모르겠어요',value:'unknown'}
  ]},
  {id:'drink',emoji:'🍵',text:'생리 기간 중 음주를 하는 편인가요?',options:[
    {label:'네, 마시는 편이에요',value:'yes'},
    {label:'거의 안 마셔요',value:'no'}
  ]},
  {id:'strength',emoji:'⚡',text:'생리통 강도가 어느 정도인가요?',options:[
    {label:'가벼운 편 (일상 생활 가능)',value:'mild'},
    {label:'보통 (집중이 어려울 정도)',value:'moderate'},
    {label:'심한 편 (누워있어야 할 정도)',value:'severe'}
  ]}
];

const products={
  buscopan:{
    icon:'🌿',name:'부스코판 플러스',mfg:'오펠라헬스케어코리아',
    ingredient:'부틸스코폴라민브롬화물 10mg + 아세트아미노펜 500mg',
    reason:'경련성(쥐어짜는) 통증이나 NSAIDs 복용이 어려운 경우에 적합해요. 자궁 평활근 경련을 억제해 뒤틀리는 느낌을 빠르게 완화시켜줍니다.',
    dosage:['성인 1회 1~2정, 1일 최대 3회 복용','4~6시간 간격으로 복용하세요','식후 복용을 권장해요','3일 이상 증상 지속 시 의사·약사 상담'],
    caution:'음주 후 복용 금지(간독성). 눈이 침침해질 수 있어 운전 주의. 녹내장 환자는 복용 불가.'
  },
  shining:{icon:'🌸',name:'샤이닝정 / 포나민정',mfg:'동화약품 / 삼진제약',ingredient:'부틸스코폴라민브롬화물 10mg + 아세트아미노펜 500mg'},
  taxen_strong:{
    icon:'⚡',name:'탁센 / 이지엔6 스트롱',mfg:'GC녹십자 / 대웅제약',
    ingredient:'나프록센 250mg (연질캡슐)',
    reason:'심한 생리통에는 반감기가 긴 나프록센 계열이 효과적이에요. 이부프로펜보다 오래(12~15시간) 지속되어 자주 먹지 않아도 돼요.',
    dosage:['초회 500mg(2캡슐) 복용 후 이후 6~8시간마다 250mg(1캡슐)','1일 최대 1,250mg(5캡슐) 초과 금지','반드시 식후 복용 (위장 보호)','생리 시작 전 선제 복용 시 효과적'],
    caution:'위장장애 위험이 높아 반드시 식후 복용. 음주 금지. 타 NSAIDs와 함께 복용 금지. 임신 30주 이후 금기.'
  },
  anaprox:{icon:'💊',name:'아나프록스',mfg:'한국로슈',ingredient:'나프록센나트륨 275mg (정제)'},
  taxen_lady:{
    icon:'🫧',name:'탁센 레이디',mfg:'GC녹십자',
    ingredient:'이부프로펜 200mg + 파마브롬 25mg + 산화마그네슘 83mg',
    reason:'이부프로펜으로 통증을, 파마브롬으로 부기를 잡고, 산화마그네슘이 위장 부작용을 완화해요. 속쓰림과 부기가 동시에 걱정될 때 제격이에요.',
    dosage:['만 15세 이상: 1회 1~2캡슐, 1일 1~3회','만 8~15세 미만: 1회 1캡슐, 1일 1~3회','4시간 이상 간격 유지','공복 복용 피하기 (가볍게 먹고 복용)'],
    caution:'마그네슘 과다 시 설사 가능. 공복 복용 피하기. 임신 30주 이후 금기.'
  },
  ezn6:{
    icon:'💖',name:'이지엔6 이브',mfg:'대웅제약',
    ingredient:'이부프로펜 200mg + 파마브롬 25mg (연질캡슐)',
    reason:'통증과 부기를 동시에 잡는 가장 기본적이고 검증된 조합이에요. 연질캡슐 형태라 흡수가 빠르고 효과 발현도 빠른 편이에요.',
    dosage:['만 15세 이상: 1회 1~2캡슐, 1일 1~3회','만 8~15세 미만: 1회 1캡슐, 1일 1~3회','4시간 이상 간격 유지','공복 복용 피하기'],
    caution:'공복 복용 금지. 음주 시 위장출혈 위험. 임신 30주 이후 금기. NSAIDs 알레르기 시 복용 금지.'
  },
  gebolin:{icon:'🌺',name:'게보린 소프트',mfg:'삼진제약',ingredient:'이부프로펜 250mg + 파마브롬 25mg (연질캡슐)'},
  womens_tylenol:{
    icon:'🤍',name:'우먼스 타이레놀',mfg:'한국얀센',
    ingredient:'아세트아미노펜 500mg + 파마브롬 25mg (정제)',
    reason:'NSAIDs가 아닌 아세트아미노펜 기반이라 위장 부담이 가장 적어요. 음주를 하지 않는 경우, 이부프로펜 부작용이 걱정될 때 안심하고 드실 수 있어요.',
    dosage:['만 12세 이상: 1회 1~2정, 1일 3~4회','4~6시간 간격으로 복용','음주 전후 복용 금지','1일 최대 8정(아세트아미노펜 4,000mg) 초과 금지'],
    caution:'음주자 복용 절대 금지(간독성). 타 아세트아미노펜 제품과 중복 복용 금지.'
  },
  advil:{icon:'💊',name:'애드빌',mfg:'한국화이자',ingredient:'이부프로펜 200mg (정제/연질캡슐)'}
};

const ans={};let step=0;

function getResult(){
  const p=ans.pain_type,sw=ans.swell,st=ans.stomach,ns=ans.nsaids,dk=ans.drink,str=ans.strength;
  if(p==='cramp'||ns==='yes'){
    return{main:'buscopan',alt:['shining']};
  }
  if(str==='severe'){
    return{main:'taxen_strong',alt:['anaprox']};
  }
  if(st==='sensitive'){
    return{main:'taxen_lady',alt:['ezn6','womens_tylenol']};
  }
  if(sw==='yes'||sw==='mild'){
    return{main:'ezn6',alt:['gebolin','taxen_lady']};
  }
  if(dk==='yes'){
    return{main:'womens_tylenol',alt:['buscopan']};
  }
  return{main:'ezn6',alt:['advil','taxen_lady']};
}

function renderDosage(d){
  if(!d)return'';
  return`<div class="dosage-box">
    <div class="dosage-title">💊 복용법</div>
    ${d.map(t=>`<div class="dosage-row"><div class="dosage-dot"></div><div>${t}</div></div>`).join('')}
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(step===0&&!document.querySelector('.quiz-header')){
    // 첫 렌더시 헤더 없으면 추가
  }
  if(step<questions.length){
    const q=questions[step];
    const pct=Math.round((step/questions.length)*100);
    const sel=ans[q.id];
    app.innerHTML=`
      <div class="quiz-header">
        <h1>🌸 생리통 약 추천 퀴즈</h1>
        <p>나에게 딱 맞는 약을 찾아드릴게요</p>
      </div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>질문 ${step+1} / ${questions.length}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="question-card">
        <div class="question-badge"><span>Q${step+1}</span></div>
        <span class="question-emoji">${q.emoji}</span>
        <div class="question-text">${q.text}</div>
      </div>
      <div class="options">${q.options.map(o=>`<button class="option-btn${sel===o.value?' selected':''}" data-val="${o.value}">${o.label}</button>`).join('')}</div>
      <div class="nav">
        <button class="btn-back"${step===0?' disabled':''}>← 이전</button>
        <button class="btn-next${sel?' active':''}">다음으로 →</button>
      </div>
    `;
    app.querySelectorAll('.option-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{ans[q.id]=btn.dataset.val;render();});
    });
    app.querySelector('.btn-back').addEventListener('click',()=>{if(step>0){step--;render();}});
    app.querySelector('.btn-next').addEventListener('click',()=>{if(ans[q.id]){step++;render();}});
  } else {
    const r=getResult();
    const m=products[r.main];
    app.innerHTML=`
      <div class="result-header">
        <span class="big-emoji">🌸</span>
        <h2>나에게 맞는 생리통 약</h2>
        <p>증상을 분석해 최적의 제품을 찾았어요</p>
      </div>
      <div class="product-card">
        <div class="best-badge">✦ 추천 제품</div>
        <div class="product-icon-wrap">${m.icon}</div>
        <div class="product-name">${m.name}</div>
        <div class="product-mfg">${m.mfg}</div>
        <div class="product-ingredient">${m.ingredient}</div>
        <div class="product-reason">${m.reason}</div>
        ${renderDosage(m.dosage)}
        <div class="caution-box">
          <div class="caution-label">⚠️ 복용 시 주의하세요</div>
          <div class="caution-text">${m.caution}</div>
        </div>
      </div>
      <div class="alt-section">
        <div class="alt-label">이런 제품도 맞을 수 있어요</div>
        ${r.alt.map(k=>{const a=products[k];return`<div class="alt-card"><div class="alt-icon">${a.icon}</div><div class="alt-info"><div class="alt-name">${a.name}</div><div class="alt-reason">${a.ingredient}</div></div></div>`;}).join('')}
      </div>
      <button class="btn-restart">🔄 처음부터 다시 하기</button>
      <div class="disclaimer">이 결과는 일반적인 정보 제공 목적입니다.<br>정확한 복약 정보는 반드시 약사 또는 의사와 상담하세요.</div>
    `;
    app.querySelector('.btn-restart').addEventListener('click',()=>{Object.keys(ans).forEach(k=>delete ans[k]);step=0;render();});
  }
}
